<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 900" preserveAspectRatio="none">
  <!--
    Portrait Dissolve Mask
    ======================
    White shapes on transparent background.
    White = visible, Transparent = hidden.
    NO black fills anywhere.

    Top 60% = solid white (face clean)
    Bottom 40% = white block islands on transparency
  -->

  <!-- SOLID ZONE: top 60% -->
  <rect x="0" y="0" width="560" height="540" fill="white"/>

  <!-- ROW 1 (y=540): almost full, first gaps appear -->
  <rect x="0"   y="540" width="108" height="36" fill="white"/>
  <rect x="120" y="540" width="84"  height="36" fill="white"/>
  <rect x="220" y="540" width="64"  height="36" fill="white"/>
  <rect x="300" y="540" width="92"  height="36" fill="white"/>
  <rect x="408" y="540" width="48"  height="36" fill="white"/>
  <rect x="472" y="540" width="88"  height="36" fill="white"/>

  <!-- ROW 2 (y=576): gaps widening -->
  <rect x="8"   y="576" width="72"  height="32" fill="white"/>
  <rect x="96"  y="576" width="48"  height="32" fill="white"/>
  <rect x="160" y="576" width="96"  height="32" fill="white"/>
  <rect x="272" y="576" width="56"  height="32" fill="white"/>
  <rect x="344" y="576" width="72"  height="32" fill="white"/>
  <rect x="432" y="576" width="40"  height="32" fill="white"/>
  <rect x="488" y="576" width="72"  height="32" fill="white"/>

  <!-- ROW 3 (y=608): medium blocks -->
  <rect x="24"  y="608" width="56"  height="40" fill="white"/>
  <rect x="96"  y="608" width="32"  height="40" fill="white"/>
  <rect x="144" y="608" width="80"  height="40" fill="white"/>
  <rect x="240" y="608" width="56"  height="40" fill="white"/>
  <rect x="312" y="608" width="40"  height="40" fill="white"/>
  <rect x="368" y="608" width="64"  height="40" fill="white"/>
  <rect x="448" y="608" width="80"  height="40" fill="white"/>

  <!-- ROW 4 (y=648): getting sparse -->
  <rect x="0"   y="648" width="48"  height="40" fill="white"/>
  <rect x="64"  y="648" width="80"  height="40" fill="white"/>
  <rect x="168" y="648" width="48"  height="40" fill="white"/>
  <rect x="240" y="648" width="72"  height="40" fill="white"/>
  <rect x="336" y="648" width="48"  height="40" fill="white"/>
  <rect x="400" y="648" width="80"  height="40" fill="white"/>
  <rect x="504" y="648" width="56"  height="40" fill="white"/>

  <!-- ROW 5 (y=688): big anchor blocks -->
  <rect x="16"  y="688" width="80"  height="48" fill="white"/>
  <rect x="144" y="688" width="56"  height="48" fill="white"/>
  <rect x="224" y="688" width="96"  height="48" fill="white"/>
  <rect x="344" y="688" width="64"  height="48" fill="white"/>
  <rect x="432" y="688" width="80"  height="48" fill="white"/>

  <!-- ROW 6 (y=736): islands -->
  <rect x="48"  y="736" width="64"  height="32" fill="white"/>
  <rect x="168" y="736" width="40"  height="32" fill="white"/>
  <rect x="240" y="736" width="80"  height="32" fill="white"/>
  <rect x="352" y="736" width="56"  height="32" fill="white"/>
  <rect x="456" y="736" width="48"  height="32" fill="white"/>

  <!-- ROW 7 (y=768): scattered fragments -->
  <rect x="80"  y="768" width="48"  height="24" fill="white"/>
  <rect x="200" y="768" width="64"  height="24" fill="white"/>
  <rect x="304" y="768" width="40"  height="24" fill="white"/>
  <rect x="408" y="768" width="56"  height="24" fill="white"/>

  <!-- ROW 8 (y=792): last strays -->
  <rect x="120" y="792" width="32"  height="20" fill="white"/>
  <rect x="232" y="792" width="48"  height="20" fill="white"/>
  <rect x="352" y="792" width="24"  height="20" fill="white"/>
  <rect x="464" y="792" width="40"  height="20" fill="white"/>

  <!-- EDGE FRAGMENTS: scattered small squares on left edge -->
  <rect x="0"   y="556" width="16"  height="16" fill="white"/>
  <rect x="0"   y="596" width="12"  height="20" fill="white"/>
  <rect x="0"   y="636" width="20"  height="12" fill="white"/>
  <rect x="0"   y="676" width="14"  height="16" fill="white"/>
  <rect x="0"   y="720" width="10"  height="12" fill="white"/>

  <!-- EDGE FRAGMENTS: scattered small squares on right edge -->
  <rect x="544" y="560" width="16"  height="16" fill="white"/>
  <rect x="548" y="600" width="12"  height="20" fill="white"/>
  <rect x="540" y="644" width="20"  height="12" fill="white"/>
  <rect x="546" y="684" width="14"  height="16" fill="white"/>
  <rect x="550" y="724" width="10"  height="12" fill="white"/>
</svg>
